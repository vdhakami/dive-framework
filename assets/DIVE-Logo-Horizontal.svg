<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A3C6E"/>
      <stop offset="100%" stop-color="#0F2440"/>
    </linearGradient>
    <linearGradient id="arrowFade2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A9E6F" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4A9E6F" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="800" height="200" rx="12" fill="url(#bgGrad2)"/>

  <!-- D I V E -->
  <text x="60" y="115" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="14" fill="#FFFFFF">
    DIVE
  </text>

  <!-- Separator line -->
  <line x1="380" y1="60" x2="380" y2="150" stroke="#4A9E6F" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Right side info -->
  <text x="410" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" letter-spacing="4">
    DIVE FRAMEWORK
  </text>

  <text x="410" y="118" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.45)" letter-spacing="3">
    DIAGNOSE · ITERATE · VALIDATE · EVOLVE
  </text>

  <!-- Green arrow accent -->
  <line x1="410" y1="136" x2="550" y2="136" stroke="url(#arrowFade2)" stroke-width="2" stroke-linecap="round"/>
  <polygon points="550,136 542,131 542,141" fill="#4A9E6F"/>

  <!-- Small tag -->
  <text x="410" y="155" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="2">
    AI PROJECT MANAGEMENT METHODOLOGY
  </text>

  <!-- Decorative dots -->
  <circle cx="30" cy="30" r="2" fill="#4A9E6F" opacity="0.3"/>
  <circle cx="770" cy="170" r="2" fill="#4A9E6F" opacity="0.3"/>
  <circle cx="770" cy="30" r="1.5" fill="#4A9E6F" opacity="0.15"/>
  <circle cx="30" cy="170" r="1.5" fill="#4A9E6F" opacity="0.15"/>
</svg>
