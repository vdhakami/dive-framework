<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A3C6E"/>
      <stop offset="100%" stop-color="#0F2440"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A9E6F"/>
      <stop offset="100%" stop-color="#3A8A5F"/>
    </linearGradient>
    <linearGradient id="arrowFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A9E6F" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4A9E6F" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="250" cy="250" r="240" fill="url(#bgGrad)"/>

  <!-- Outer ring -->
  <circle cx="250" cy="250" r="225" fill="none" stroke="#4A9E6F" stroke-width="1.5" stroke-opacity="0.3"/>
  <circle cx="250" cy="250" r="210" fill="none" stroke="#4A9E6F" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- Decorative dots at corners -->
  <circle cx="250" cy="40" r="3" fill="#4A9E6F" opacity="0.5"/>
  <circle cx="250" cy="460" r="3" fill="#4A9E6F" opacity="0.5"/>
  <circle cx="40" cy="250" r="3" fill="#4A9E6F" opacity="0.5"/>
  <circle cx="460" cy="250" r="3" fill="#4A9E6F" opacity="0.5"/>

  <!-- D I V E text -->
  <text x="250" y="195" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="82" font-weight="800" letter-spacing="18" fill="#FFFFFF">
    DIVE
  </text>

  <!-- Arrow beneath text -->
  <line x1="170" y1="225" x2="330" y2="225" stroke="url(#arrowFade)" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="330,225 320,219 320,231" fill="#4A9E6F"/>

  <!-- Phase labels -->
  <text x="250" y="268" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.5)" letter-spacing="4">
    DIAGNOSE · ITERATE · VALIDATE · EVOLVE
  </text>

  <!-- Tagline -->
  <text x="250" y="305" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)" letter-spacing="3">
    AI PROJECT MANAGEMENT METHODOLOGY
  </text>

  <!-- Bottom decorative element -->
  <line x1="220" y1="330" x2="280" y2="330" stroke="#4A9E6F" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="235" y1="338" x2="265" y2="338" stroke="#4A9E6F" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- 4 small diamonds representing 4 phases -->
  <rect x="160" y="370" width="12" height="12" rx="2" fill="#4A9E6F" opacity="0.8" transform="rotate(45, 166, 376)"/>
  <rect x="210" y="370" width="12" height="12" rx="2" fill="#4A9E6F" opacity="0.5" transform="rotate(45, 216, 376)"/>
  <rect x="260" y="370" width="12" height="12" rx="2" fill="#4A9E6F" opacity="0.3" transform="rotate(45, 266, 376)"/>
  <rect x="310" y="370" width="12" height="12" rx="2" fill="#4A9E6F" opacity="0.15" transform="rotate(45, 316, 376)"/>

  <!-- Connecting line through diamonds -->
  <line x1="166" y1="382" x2="322" y2="382" stroke="#4A9E6F" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Background watermark hexagons -->
  <g opacity="0.03">
    <polygon points="250,100 270,115 270,145 250,160 230,145 230,115" fill="none" stroke="#fff" stroke-width="2"/>
    <polygon points="330,350 350,365 350,395 330,410 310,395 310,365" fill="none" stroke="#fff" stroke-width="2"/>
    <polygon points="130,320 150,335 150,365 130,380 110,365 110,335" fill="none" stroke="#fff" stroke-width="2"/>
  </g>
</svg>
